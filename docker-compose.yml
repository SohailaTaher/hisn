# HISN — Local development services
# Brings up Redis as Celery broker + result backend.
# Start:   docker compose up -d
# Stop:    docker compose down
# Status:  docker compose ps

services:
  redis:
    image: redis:7-alpine
    container_name: hisn-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5